# Cloudflare Pages configuration
# This file configures KV bindings and environment variables

name = "dbe-app"
compatibility_date = "2024-01-01"

# KV namespace for LNURL-auth challenges
# Create with: npx wrangler kv:namespace create DBE_AUTH
[[kv_namespaces]]
binding = "AUTH_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Environment variables (set in Cloudflare Pages dashboard, not here)
# SUPABASE_URL = "https://xxx.supabase.co"
# SUPABASE_SERVICE_KEY = "eyJ..."
